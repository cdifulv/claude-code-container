services:
  claude-code:
    build: .
    container_name: claude-code-container
    stdin_open: true
    tty: true
    volumes:
      - ~/Sites:/workspace/Sites
      - ~/MCP:/workspace/MCP
      - ~/intelephense/licence.txt:/root/intelephense/licence.txt:ro
    working_dir: /workspace
    environment:
      - TERM=xterm-256color
    networks:
      - shared-mcp

networks:
  shared-mcp:
    external: true
